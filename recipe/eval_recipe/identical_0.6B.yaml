model:
  model_name: Rosetta
  rosetta_config:
    base_model: Qwen/Qwen3-0.6B
    teacher_model: Qwen/Qwen3-0.6B
    is_do_alignment: false
    alignment_strategy: "first"
    checkpoints_dir: 0.6B_identical_C2C/final

  generation_config:
    do_sample: false
    max_new_tokens: 64

output:
  output_dir: local/final_results/identical_0.6B

eval:
  dataset: mmlu-redux
  gpu_ids: [0]
  answer_method: generate
  use_cot: false
  use_template: true
  sample_interval: 1
  math_grading_method: "comprehensive"
